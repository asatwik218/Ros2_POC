/**:
  ros__parameters:
    vendor: "sim"
    serial_number: ""
    ip_address: ""
    num_joints: 7

    rt:
      cycle_time_us: 1000      # 1kHz
      cpu_affinity: -1         # no pinning in sim
      scheduler: "fifo"
      priority: 50             # lower priority in sim
      command_timeout_ms: 100

    state_publish_rate: 100.0  # Hz
