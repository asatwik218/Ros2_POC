      - arm_center_joint2
      - arm_center_joint3
      - arm_center_joint4
      - arm_center_joint5
      - arm_center_joint6
      - arm_center_joint7

arm_right_direct_cmd:
  ros__parameters:
    prefix: "arm_right_"
    joints:
      - arm_right_joint1
      - arm_right_joint2
      - arm_right_joint3
      - arm_right_joint4
      - arm_right_joint5
      - arm_right_joint6
      - arm_right_joint7

# ── NRT passthrough controllers ────────────────────────────────────────────────

arm_left_nrt:
  ros__parameters:
    prefix: "arm_left_"

arm_center_nrt:
  ros__parameters:
    prefix: "arm_center_"

arm_right_nrt:
  ros__parameters:
    prefix: "arm_right_"

# ── Cartesian controllers ──────────────────────────────────────────────────────

arm_left_cartesian:
  ros__parameters:
    prefix: "arm_left_"

arm_center_cartesian:
  ros__parameters:
    prefix: "arm_center_"

arm_right_cartesian:
  ros__parameters:
    prefix: "arm_right_"
