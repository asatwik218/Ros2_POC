# cynlr_controllers.yaml
# Controller manager configuration for the CynLR three-arm system.
#
# update_rate: 1000 Hz drives all three arms in a single RT loop.
#
# How to switch between motion modes for a given arm (example: left arm):
#
#   MoveIt / JointTrajectoryController (default):
#     ros2 control switch_controllers \
#       --activate arm_left_jt_controller \
#       --deactivate arm_left_direct_cmd arm_left_nrt arm_left_cartesian
#
#   Escape hatch #1 — Direct joint commands from a custom planner:
#     ros2 control switch_controllers \
#       --activate arm_left_direct_cmd \
#       --deactivate arm_left_jt_controller arm_left_nrt arm_left_cartesian
#
#   Escape hatch #2 — NRT arm planner (MoveL/J/PTP actions):
#     ros2 control switch_controllers \
#       --activate arm_left_nrt \
#       --deactivate arm_left_jt_controller arm_left_direct_cmd arm_left_cartesian
#
#   Escape hatch #3 — Cartesian (force control / visual servoing):
#     ros2 control switch_controllers \
#       --activate arm_left_cartesian \
#       --deactivate arm_left_jt_controller arm_left_direct_cmd arm_left_nrt

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz — all three arms run in this single control loop

    # ── Always active ────────────────────────────────────────────────────────
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_left_state_broadcaster:
      type: cynlr_state_broadcaster/CynlrStateBroadcaster
    arm_center_state_broadcaster:
      type: cynlr_state_broadcaster/CynlrStateBroadcaster
    arm_right_state_broadcaster:
      type: cynlr_state_broadcaster/CynlrStateBroadcaster

    # ── Default motion path (MoveIt / FollowJointTrajectory) ─────────────────
    arm_left_jt_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    arm_center_jt_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    arm_right_jt_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # ── Escape hatch #1 — Direct joint commands ───────────────────────────────
    arm_left_direct_cmd:
      type: cynlr_direct_command_controller/CynlrDirectCommandController
    arm_center_direct_cmd:
      type: cynlr_direct_command_controller/CynlrDirectCommandController
    arm_right_direct_cmd:
      type: cynlr_direct_command_controller/CynlrDirectCommandController

    # ── Escape hatch #2 — NRT passthrough (MoveL/J/PTP) ──────────────────────
    arm_left_nrt:
      type: cynlr_nrt_passthrough_controller/CynlrNrtPassthroughController
    arm_center_nrt:
      type: cynlr_nrt_passthrough_controller/CynlrNrtPassthroughController
    arm_right_nrt:
      type: cynlr_nrt_passthrough_controller/CynlrNrtPassthroughController

    # ── Escape hatch #3 — Cartesian command (force/Cartesian policies) ────────
    arm_left_cartesian:
      type: cynlr_cartesian_controller/CynlrCartesianController
    arm_center_cartesian:
      type: cynlr_cartesian_controller/CynlrCartesianController
    arm_right_cartesian:
      type: cynlr_cartesian_controller/CynlrCartesianController

# ── Per-controller parameters ──────────────────────────────────────────────────

arm_left_state_broadcaster:
  ros__parameters:
    prefix: "arm_left_"
    publish_rate: 100.0  # Hz for full ArmState msg; TCP/FT publish at update_rate

arm_center_state_broadcaster:
  ros__parameters:
    prefix: "arm_center_"
    publish_rate: 100.0

arm_right_state_broadcaster:
  ros__parameters:
    prefix: "arm_right_"
    publish_rate: 100.0

# ── JointTrajectoryController per arm ─────────────────────────────────────────

arm_left_jt_controller:
  ros__parameters:
    joints:
      - arm_left_joint1
      - arm_left_joint2
      - arm_left_joint3
      - arm_left_joint4
      - arm_left_joint5
      - arm_left_joint6
      - arm_left_joint7
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0

arm_center_jt_controller:
  ros__parameters:
    joints:
      - arm_center_joint1
      - arm_center_joint2
      - arm_center_joint3
      - arm_center_joint4
      - arm_center_joint5
      - arm_center_joint6
      - arm_center_joint7
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0

arm_right_jt_controller:
  ros__parameters:
    joints:
      - arm_right_joint1
      - arm_right_joint2
      - arm_right_joint3
      - arm_right_joint4
      - arm_right_joint5
      - arm_right_joint6
      - arm_right_joint7
    command_interfaces: [position]
    state_interfaces:   [position, velocity]
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0

# ── Direct command controllers ─────────────────────────────────────────────────

arm_left_direct_cmd:
  ros__parameters:
    prefix: "arm_left_"
    joints:
      - arm_left_joint1
      - arm_left_joint2
      - arm_left_joint3
      - arm_left_joint4
      - arm_left_joint5
      - arm_left_joint6
      - arm_left_joint7

arm_center_direct_cmd:
  ros__parameters:
    prefix: "arm_center_"
    joints:
