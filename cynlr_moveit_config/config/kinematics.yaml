/**:
  ros__parameters:
    robot_description_kinematics:
      # Per-arm KDL solver — swap for a custom plugin in kinematics_solver
      # to use the arm's own analytical IK or a learning-based solver.
      arm_left_arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05

      arm_center_arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05

      arm_right_arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05

      # all_arms uses per-subgroup solvers; no kinematics_solver entry needed
