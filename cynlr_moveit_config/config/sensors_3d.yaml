/**:
  ros__parameters:
    sensors:
      - camera_0_octomap

    camera_0_octomap:
      sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
      point_cloud_topic: /camera_0/points
      max_range: 2.0
      point_subsample: 1
      padding_offset: 0.01
      padding_scale: 1.0
      max_update_rate: 1.0
      filtered_cloud_topic: /camera_0/points_filtered
